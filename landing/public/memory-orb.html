<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memory Orb</title>
<style>
  :root {
    color-scheme: light;
    --ink: #2a1f33;
    --ink-soft: #6b5a7c;
    --ink-faint: #b0a2c0;
    --line: rgba(180, 160, 200, 0.28);
    --accent: #8a6ab0;
    --accent-soft: #d8c8e6;
    --gold: #c89c5c;
    --rose: #c4707b;
    --serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(ellipse 100% 70% at 50% 0%, #fff0e4 0%, transparent 60%),
      linear-gradient(165deg,
        #ffe6ec 0%,
        #ffeed4 18%,
        #fff8e8 38%,
        #f4e6f4 62%,
        #e0d0ee 85%,
        #d4c8e8 100%);
    position: relative;
    min-height: 100vh;
    transition: background 0.6s ease, color 0.6s ease;
  }
  body.dark {
    color: #f0eaff;
    background:
      radial-gradient(ellipse 100% 70% at 50% 0%, #1a0f2e 0%, transparent 60%),
      linear-gradient(165deg,
        #0a0418 0%,
        #100828 22%,
        #1a0f30 50%,
        #221038 78%,
        #150a25 100%);
  }
  body.dark .atmosphere {
    background:
      radial-gradient(ellipse 70% 50% at 25% 30%, rgba(120, 60, 130, 0.4), transparent 65%),
      radial-gradient(ellipse 60% 50% at 75% 75%, rgba(60, 40, 130, 0.35), transparent 65%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(80, 50, 100, 0.3), transparent 70%);
  }
  body.dark .clouds::before, body.dark .clouds::after, body.dark .clouds > div {
    background: radial-gradient(ellipse, rgba(120, 80, 180, 0.25), transparent 70%);
  }
  body.dark .stars > div {
    background: rgba(255, 255, 255, 0.55);
    box-shadow: 0 0 2px 0.5px rgba(255, 255, 255, 0.25);
  }
  body.dark .actions button {
    background: transparent;
    color: #f0eaff;
  }
  body.dark .actions button:hover {
    color: #d8c4f8;
    background: transparent;
  }
  body.dark .brand { color: #c0aedc; }
  body.dark .brand .count { color: #d8c4f8; }
  body.dark .hint { color: rgba(200, 180, 230, 0.6); }
  body.dark .empty-orb .title { color: #f0eaff; text-shadow: 0 1px 12px rgba(120, 80, 180, 0.6); }
  body.dark .empty-orb .sub { color: #b8a4d0; text-shadow: 0 1px 8px rgba(80, 40, 120, 0.6); }
  body.dark .capture {
    background: transparent;
    border: 0;
    box-shadow: none;
  }
  body.dark .capture textarea { color: #f0eaff; }
  body.dark .capture textarea::placeholder { color: rgba(200, 180, 230, 0.5); }
  body.dark .meta-chip {
    background: transparent;
    color: #d8c4f8;
  }
  body.dark .meta-chip:hover { color: #f0eaff; background: transparent; }
  body.dark .panel, body.dark .patterns {
    background: rgba(30, 18, 50, 0.78);
    border-color: rgba(180, 150, 220, 0.3);
    color: #f0eaff;
  }
  body.dark .panel .when, body.dark .patterns .sub { color: #b8a4d0; }
  body.dark .panel .body, body.dark .patterns h3, body.dark .patterns-content { color: #f0eaff; }
  body.dark .panel .meta-line { color: #d8c4f8; }
  body.dark .panel-actions button { color: #d8c4f8; background: rgba(180, 150, 220, 0.15); }
  body.dark .panel-actions button:hover { color: #f0eaff; background: rgba(180, 150, 220, 0.28); }
  body.dark .related-item { color: #d8c4f8; border-color: rgba(180, 150, 220, 0.2); }
  body.dark .library {
    background: rgba(30, 18, 50, 0.95);
    border-color: rgba(180, 150, 220, 0.3);
  }
  body.dark .library-head h2, body.dark .entry .text { color: #f0eaff; }
  body.dark .library-head input { color: #f0eaff; border-color: rgba(180, 150, 220, 0.3); }
  body.dark .entry:hover { background: rgba(80, 50, 120, 0.25); }
  body.dark .entry .meta { color: #b8a4d0; }
  body.dark .entry-thumb { background: linear-gradient(135deg, #4a2a6e, #2a1a4a); }

  /* atmospheric layers */
  .atmosphere, .clouds, .stars {
    position: fixed; inset: 0; pointer-events: none;
  }
  .atmosphere {
    background:
      radial-gradient(ellipse 70% 50% at 25% 30%, rgba(255, 180, 210, 0.55), transparent 65%),
      radial-gradient(ellipse 60% 50% at 75% 75%, rgba(200, 180, 250, 0.55), transparent 65%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 220, 170, 0.45), transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(255, 200, 230, 0.5), transparent 65%);
    animation: atmosphere-shift 90s ease-in-out infinite;
  }
  @keyframes atmosphere-shift {
    0%, 100% { transform: scale(1) translate(0, 0); }
    33% { transform: scale(1.08) translate(2%, -1%); }
    66% { transform: scale(0.96) translate(-1%, 2%); }
  }

  .clouds::before, .clouds::after, .clouds > div {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55), transparent 70%);
    filter: blur(50px);
  }
  .clouds::before { width: 50%; height: 30%; top: 8%; left: -8%; animation: cloud1 100s linear infinite; }
  .clouds::after  { width: 60%; height: 35%; top: 65%; right: -15%; animation: cloud2 120s linear infinite; }
  .clouds > .c3   { width: 40%; height: 25%; top: 35%; left: 60%; animation: cloud3 90s ease-in-out infinite; }
  @keyframes cloud1 { 0% { transform: translateX(-30%); } 100% { transform: translateX(60vw); } }
  @keyframes cloud2 { 0% { transform: translateX(30%); } 100% { transform: translateX(-60vw); } }
  @keyframes cloud3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, 5%); } }

  /* tiny sparkle particles — many, faint, very slow wink.
     Masked so stars sitting behind the orb fade out — only the surrounding sky shows them. */
  .stars {
    z-index: 2;
    -webkit-mask: radial-gradient(circle at center,
      transparent 0,
      transparent 36vmin,
      rgba(0,0,0,0.4) 44vmin,
      black 60vmin);
            mask: radial-gradient(circle at center,
      transparent 0,
      transparent 36vmin,
      rgba(0,0,0,0.4) 44vmin,
      black 60vmin);
  }
  .stars > div {
    position: absolute;
    width: 2px; height: 2px; border-radius: 50%;
    background: rgba(150, 110, 180, 0.8);
    box-shadow: 0 0 3px 1px rgba(180, 150, 210, 0.4);
  }
  body.dark .stars > div {
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 0 3px 1px rgba(255, 255, 255, 0.5);
  }
  @keyframes twinkle {
    0%   { opacity: 0;   transform: scale(0.4); }
    40%  { opacity: 0.5; transform: scale(1.0); }
    60%  { opacity: 0.5; transform: scale(1.0); }
    100% { opacity: 0;   transform: scale(0.4); }
  }

  /* aura behind the orb — driven by JS each frame to follow camera */
  .aura {
    position: fixed;
    top: 50%; left: 50%;
    width: 52vmin; height: 52vmin;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(50px) hue-rotate(var(--aura-hue, 0deg));
    background: conic-gradient(
      from 0deg,
      rgba(255, 170, 200, 0.85),
      rgba(255, 200, 150, 0.8),
      rgba(255, 240, 180, 0.85),
      rgba(190, 235, 200, 0.8),
      rgba(170, 210, 250, 0.85),
      rgba(210, 180, 240, 0.85),
      rgba(255, 170, 200, 0.85));
    opacity: 0.95;
    z-index: 1;
  }

  /* canvas */
  #orb-canvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    cursor: grab;
    touch-action: none;
    z-index: 5;
  }
  #orb-canvas.dragging { cursor: grabbing; }

  /* header */
  header {
    position: fixed; top: 22px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 26px;
    z-index: 20;
    pointer-events: none;
  }
  header > * { pointer-events: auto; }
  .brand {
    font-family: var(--serif);
    font-size: 13px; letter-spacing: 4px;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-style: italic;
  }
  .brand .count {
    font-style: normal;
    margin-left: 10px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 1px;
  }
  .actions {
    display: flex; gap: 4px;
  }
  .actions button {
    background: transparent;
    border: 0;
    color: var(--ink);
    padding: 7px 13px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: color 0.2s, transform 0.2s;
    font-family: var(--sans);
  }
  .actions button:hover {
    color: var(--accent);
    transform: translateY(-1px);
  }

  /* hint — centered on the orb, fades out after 10 seconds */
  .hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #000;
    font-size: 11px; letter-spacing: 1.8px;
    pointer-events: none;
    z-index: 10;
    text-align: center;
    transition: opacity 1.5s ease;
    opacity: 1;
  }
  body.dark .hint { color: #000; }
  .hint.fade { opacity: 0; }

  /* empty state */
  .empty-orb {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 8;
    color: var(--ink);
    transition: opacity 0.5s;
  }
  .empty-orb.gone { opacity: 0; }
  .empty-orb .title {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
    text-shadow: 0 1px 12px rgba(255, 255, 255, 0.7);
  }
  .empty-orb .sub {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    text-transform: lowercase;
    text-shadow: 0 1px 8px rgba(255, 255, 255, 0.6);
  }

  /* capture bar */
  .capture {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    width: min(620px, 92vw);
    background: transparent;
    border: 0;
    padding: 0;
    z-index: 25;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .capture textarea {
    width: 100%;
    background: transparent;
    border: 0; outline: 0; resize: none;
    font-family: var(--serif);
    font-size: 16px; line-height: 1.5;
    color: var(--ink);
    min-height: 24px;
    overflow: hidden;
    text-align: center;
  }
  .capture textarea::placeholder { color: var(--ink-faint); font-style: italic; }
  .capture-meta {
    display: flex; gap: 14px; align-items: center; margin-top: 4px;
    justify-content: center;
    width: 100%;
  }
  .meta-chip {
    background: transparent;
    border: 0;
    padding: 5px 8px;
    font-size: 11px; color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color 0.15s, transform 0.15s;
    font-family: var(--sans);
  }
  .meta-chip:hover { color: var(--accent); transform: translateY(-1px); }
  .meta-chip.active { color: var(--accent); }
  .meta-chip svg { width: 11px; height: 11px; flex-shrink: 0; }
  .capture-save {
    margin-left: 6px;
    background: transparent;
    color: var(--accent);
    border: 0;
    padding: 6px 8px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.2s, color 0.2s;
    font-family: var(--sans);
    font-weight: 500;
  }
  .capture-save:disabled { opacity: 0.35; cursor: default; color: var(--ink-faint); }
  .capture-save:not(:disabled):hover { transform: translateY(-1px); color: var(--ink); }
  body.dark .capture-save { color: #d8c4f8; }
  body.dark .capture-save:not(:disabled):hover { color: #f0eaff; }
  body.dark .capture-save:disabled { color: rgba(220,200,240,0.35); }
  .capture-extras {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .capture-extras.open { max-height: 280px; }
  .extras-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 8px;
  }
  .extras-row input[type="text"] {
    flex: 1;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(180, 150, 220, 0.2);
    padding: 6px 4px;
    font-size: 13px;
    outline: 0;
    color: var(--ink);
    font-family: var(--sans);
    text-align: center;
  }
  .extras-row input[type="text"]:focus { border-bottom-color: var(--accent); }
  body.dark .extras-row input[type="text"] { color: #f0eaff; border-bottom-color: rgba(220,200,240,0.25); }
  body.dark .extras-row input[type="text"]:focus { border-bottom-color: #c8a8f0; }
  .photo-preview-wrap {
    margin-top: 8px; position: relative;
    display: none;
  }
  .photo-preview-wrap.shown { display: block; }
  .photo-preview {
    max-height: 100px;
    border-radius: 10px;
    border: 1px solid var(--line);
    box-shadow: 0 4px 12px -4px rgba(80, 60, 100, 0.25);
  }
  .photo-clear {
    position: absolute; top: -6px; left: 90px;
    background: rgba(40,30,50,0.85); color: white;
    border: 0; width: 18px; height: 18px;
    border-radius: 50%; cursor: pointer;
    font-size: 12px; line-height: 1;
  }

  /* memory detail panel */
  .panel {
    position: fixed; top: 70px; right: 24px;
    width: min(380px, 90vw); max-height: calc(100vh - 180px);
    background: rgba(255, 252, 250, 0.78);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 22px;
    box-shadow: 0 26px 70px -20px rgba(80, 60, 100, 0.4);
    padding: 24px;
    overflow-y: auto;
    z-index: 30;
    transform: translateX(440px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
  }
  .panel.open { transform: translateX(0); opacity: 1; }
  .panel-close {
    position: absolute; top: 14px; right: 16px;
    background: transparent; border: 0; color: var(--ink-faint);
    font-size: 22px; cursor: pointer; line-height: 1; padding: 2px;
  }
  .panel-close:hover { color: var(--ink); }
  .panel .when {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 12px;
  }
  .panel .photo {
    width: 100%; border-radius: 14px; margin-bottom: 14px;
    box-shadow: 0 12px 28px -10px rgba(80, 60, 100, 0.4);
    display: block;
  }
  .panel .body {
    font-family: var(--serif); font-size: 16px; line-height: 1.6;
    color: var(--ink); white-space: pre-wrap; margin-bottom: 14px;
  }
  .panel .meta-line {
    font-size: 12px; color: var(--ink-soft);
    display: flex; align-items: center; gap: 8px;
    margin: 6px 0;
    font-family: var(--sans);
  }
  .panel .meta-line svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--accent); }
  .panel .meta-line a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .panel .meta-line a:hover { text-decoration: underline; }
  .panel-actions {
    display: flex; gap: 8px; margin-top: 18px;
    padding-top: 14px; border-top: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .panel-actions button {
    background: transparent; border: 0;
    color: var(--ink-soft); font-size: 11px;
    padding: 6px 8px; cursor: pointer;
    letter-spacing: 0.3px;
    font-family: var(--sans);
    transition: color 0.15s;
  }
  .panel-actions button:hover { color: var(--accent); }
  .panel-actions button.danger:hover { color: var(--rose); }
  .related-section {
    margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .related-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px;
  }
  .related-item {
    font-family: var(--serif); font-size: 13px; line-height: 1.5;
    color: var(--ink-soft); cursor: pointer;
    padding: 6px 0; border-bottom: 1px solid var(--line);
    transition: color 0.15s;
  }
  .related-item:last-child { border-bottom: 0; }
  .related-item:hover { color: var(--accent); }

  /* patterns panel */
  .patterns {
    position: fixed; top: 70px; left: 24px;
    width: min(420px, 90vw); max-height: calc(100vh - 180px);
    background: rgba(255, 250, 242, 0.85);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    border: 1px solid rgba(255, 240, 220, 0.8);
    border-radius: 22px;
    box-shadow: 0 26px 70px -20px rgba(150, 110, 70, 0.35);
    padding: 24px;
    overflow-y: auto;
    z-index: 30;
    transform: translateX(-440px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
  }
  .patterns.open { transform: translateX(0); opacity: 1; }
  .patterns h3 {
    font-family: var(--serif); font-weight: 400; font-size: 17px;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .patterns .sub {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 18px;
  }
  .patterns-content {
    font-family: var(--serif); font-size: 14px; line-height: 1.65;
    color: var(--ink); white-space: pre-wrap;
  }
  .patterns-loading {
    display: flex; align-items: center; gap: 10px;
    color: var(--ink-faint); font-size: 13px; font-style: italic;
    font-family: var(--serif);
  }
  .loading-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1; transform: scale(1.3); }
  }
  .patterns-empty {
    color: var(--ink-faint); font-style: italic; font-family: var(--serif);
    font-size: 14px; line-height: 1.6;
  }

  /* floating actions panel for the hovered orb (galaxy view) */
  .orb-actions-panel {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 18px;
    z-index: 30;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.5px;
    color: rgba(220, 200, 240, 0.8);
    pointer-events: auto;
  }
  body.galaxy-view .orb-actions-panel.show { display: flex; }
  .orb-actions-panel .orb-actions-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: rgba(255,255,255,0.95);
  }
  .orb-actions-panel a {
    cursor: pointer;
    transition: color 0.15s;
  }
  .orb-actions-panel a:hover { color: #f0eaff; }
  .orb-actions-panel a.danger:hover { color: #ff8aa0; }

  /* inline rename input for galaxy orbs (works without browser prompt) */
  .orb-rename-input {
    position: fixed;
    background: rgba(20, 12, 35, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(180, 150, 220, 0.4);
    border-radius: 10px;
    padding: 10px 16px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: #f0eaff;
    outline: 0;
    z-index: 100;
    display: none;
    text-align: center;
    min-width: 200px;
    box-shadow: 0 12px 32px -10px rgba(0,0,0,0.6);
  }
  .orb-rename-input.show { display: block; }
  .orb-rename-actions {
    position: fixed;
    z-index: 100;
    display: none;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: var(--sans);
  }
  .orb-rename-actions.show { display: flex; }
  .orb-rename-actions a {
    color: rgba(220, 200, 240, 0.7);
    cursor: pointer;
    transition: color 0.15s;
  }
  .orb-rename-actions a:hover { color: #f0eaff; }
  .orb-rename-actions a.danger:hover { color: #ff8aa0; }

  /* galaxy 3D view — hide orb-mode UI AND the hazy atmosphere layers (which glitch on dark bg) */
  body.galaxy-view .capture,
  body.galaxy-view .aura,
  body.galaxy-view .atmosphere,
  body.galaxy-view .clouds,
  body.galaxy-view .size-controls,
  body.galaxy-view .hint,
  body.galaxy-view .memory-display,
  body.galaxy-view .panel,
  body.galaxy-view .patterns,
  body.galaxy-view .themes-menu,
  body.galaxy-view .constellation-toggle,
  body.galaxy-view #btn-themes,
  body.galaxy-view #btn-ambient,
  body.galaxy-view #btn-patterns,
  body.galaxy-view #btn-constellations,
  body.galaxy-view #btn-browse,
  body.galaxy-view #btn-export,
  body.galaxy-view #btn-import {
    display: none !important;
  }
  /* Galaxy view bg = pure deep void with just the slow-twinkling stars */
  body.galaxy-view .stars {
    -webkit-mask: none;
            mask: none;
  }

  const ORB_LIST_KEY = "memory-orb.galaxy.list";
  const ACTIVE_ORB_KEY = "memory-orb.galaxy.active";
  const MIGRATION_KEY = "memory-orb.galaxy.migrated.v1";

  // Initialize galaxy: existing data lives under "v3" namespace as the first orb
  let orbList = (function() {
    try { return JSON.parse(localStorage.getItem(ORB_LIST_KEY)) || []; } catch (e) { return []; }
  })();
  if (orbList.length === 0) {
    orbList = [{ id: "v3", name: "first orb", created: Date.now() }];
    localStorage.setItem(ORB_LIST_KEY, JSON.stringify(orbList));
  }
  let activeOrbId = localStorage.getItem(ACTIVE_ORB_KEY);
  if (!activeOrbId || !orbList.some(o => o.id === activeOrbId)) {
    activeOrbId = orbList[0].id;
    localStorage.setItem(ACTIVE_ORB_KEY, activeOrbId);
  }

  // One-time migration: old global theme/halo/aura/custom keys → namespaced under v3
  if (!localStorage.getItem(MIGRATION_KEY)) {
    const moves = [
      ["memory-orb.color-theme", "memory-orb.v3.color-theme"],
      ["memory-orb.custom-theme", "memory-orb.v3.custom-theme"],
      ["memory-orb.halo", "memory-orb.v3.halo"],
      ["memory-orb.aura", "memory-orb.v3.aura"]
    ];
    for (const [oldK, newK] of moves) {
      const v = localStorage.getItem(oldK);
      if (v && !localStorage.getItem(newK)) localStorage.setItem(newK, v);
    }
    localStorage.setItem(MIGRATION_KEY, "1");
  }

  // ============================================================
  // STORAGE (namespaced by activeOrbId)
  // ============================================================
  const STORAGE_KEY = `memory-orb.${activeOrbId}.entries`;
  const POS_KEY     = `memory-orb.${activeOrbId}.positions`;
  const SEEN_KEY    = `memory-orb.${activeOrbId}.seen`;

  function safeParse(raw, fallback) {
    try { return raw ? JSON.parse(raw) : fallback; } catch (e) { return fallback; }
  }
  function load() { return safeParse(localStorage.getItem(STORAGE_KEY), []); }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  function loadPositions() { return safeParse(localStorage.getItem(POS_KEY), {}); }
  function savePositions() { localStorage.setItem(POS_KEY, JSON.stringify(positions)); }
  function loadSeen() { return safeParse(localStorage.getItem(SEEN_KEY), {}); }
  function saveSeen() { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); }

  // One-time clear of all saved memories (runs once per browser, then never again)
  const CLEAR_FLAG = "memory-orb.cleared.20260506-1";
  if (!localStorage.getItem(CLEAR_FLAG)) {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(POS_KEY);
    localStorage.removeItem(SEEN_KEY);
    localStorage.setItem(CLEAR_FLAG, "1");
  }

  let entries = load();
  let positions = loadPositions();
  let seen = loadSeen();
  let edges = [];
  // Pattern constellations — set after running "find patterns"
  // Each: { name, observation, ids: [entryIds], hue }
  let constellations = [];

  // ============================================================
  // 3D MATH
  // ============================================================
  function hashStr(s) {
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function fract(x) { return x - Math.floor(x); }
  function rand01(seed, k) {
    return fract(Math.sin(seed * 12.9898 + k * 78.233) * 43758.5453);
  }

  function positionFor(id) {
    if (positions[id]) return positions[id];
    const h = hashStr(id);
    const u = rand01(h, 1);
    const v = rand01(h, 2);
    // Uniform on sphere
    const phi = u * Math.PI * 2;
    const cosTheta = 2 * v - 1;
    const sinTheta = Math.sqrt(1 - cosTheta * cosTheta);
    const r = 1.0 + rand01(h, 3) * 0.15;
    const p = {
      x: r * sinTheta * Math.cos(phi),
      y: r * cosTheta,
      z: r * sinTheta * Math.sin(phi)
    };
    positions[id] = p;
    savePositions();
    return p;
  }

  // Camera — starts zoomed out, intro animates in while spinning
  const cam = { yaw: 0.3, pitch: -0.2, distance: 9.5 };
  let momentum = { yaw: 0.012, pitch: 0 };
  let camAnim = null;
  let intro = { startTime: performance.now(), duration: 5500, fromD: 9.5, toD: 1.85, done: false };

  function spinToFace(p, duration) {
    duration = duration || 800;
    // Rotate the orb so this 3D point faces the camera (smallest z = closest)
    const targetYaw = Math.atan2(-p.x, -p.z);
    const targetPitch = Math.atan2(-p.y, Math.hypot(p.x, p.z));
    const TAU = Math.PI * 2;
    let dYaw = targetYaw - cam.yaw;
    dYaw = ((dYaw + Math.PI) % TAU + TAU) % TAU - Math.PI;
    let dPitch = targetPitch - cam.pitch;
    dPitch = ((dPitch + Math.PI) % TAU + TAU) % TAU - Math.PI;
    camAnim = {
      startYaw: cam.yaw,
      startPitch: cam.pitch,
      dYaw, dPitch,
      startTime: performance.now(),
      duration
    };
  }

  function project(p, vw, vh) {
    const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
    const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
    let x1 = p.x * cy - p.z * sy;
    let z1 = p.x * sy + p.z * cy;
    let y2 = p.y * cp - z1 * sp;
    let z2 = p.y * sp + z1 * cp;
    const f = Math.min(vw, vh) * 0.42;
    const d = cam.distance;
    const scale = f / (z2 + d);
    return {
      x: vw / 2 + x1 * scale,
      y: vh / 2 + y2 * scale,
      z: z2,
      scale: scale
    };
  }

  // ============================================================
  // CONTEXT WEB (similarity-based edges)
  // ============================================================
  const STOP = new Set(("the a an and or but is are was were be been being i you he she it we they me him her us them my your his hers its our their this that these those not no nor do does did doing have has had having will would should could can may might must just like so as if by from of in on at to for with up out about into through over under again more most other some such own same than too very also then when where why how what who whom which all any both each few only own here there now").split(" "));
  function tokenize(t) {
    return (t.toLowerCase().match(/\b[a-z][a-z']{2,}\b/g) || []).filter(w => !STOP.has(w));
  }
  function sim(a, b) {
    const sa = new Set(tokenize(a));
    const sb = new Set(tokenize(b));
    if (!sa.size || !sb.size) return 0;
    let inter = 0;
    for (const w of sa) if (sb.has(w)) inter++;
    return inter / (sa.size + sb.size - inter);
  }
  function computeEdges() {
    const set = new Set();
    const out = [];
    for (let i = 0; i < entries.length; i++) {
      const sims = [];
      for (let j = 0; j < entries.length; j++) {
        if (i === j) continue;
        const s = sim(entries[i].text, entries[j].text);
        if (s > 0.06) sims.push({ j, s });
      }
      sims.sort((a, b) => b.s - a.s);
      for (const { j, s } of sims.slice(0, 3)) {
        const k = [entries[i].id, entries[j].id].sort().join("|");
        if (!set.has(k)) {
          set.add(k);
          out.push({ a: entries[i].id, b: entries[j].id, s });
        }
      }
    }
    edges = out;
  }
  function relatedTo(id, n) {
    return edges
      .filter(e => e.a === id || e.b === id)
      .map(e => e.a === id ? e.b : e.a)
      .map(rid => entries.find(en => en.id === rid))
      .filter(Boolean)
      .slice(0, n);
  }

  // ============================================================
  // CANVAS
  // ============================================================
  const canvas = document.getElementById("orb-canvas");
  const ctx = canvas.getContext("2d");
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let vw = window.innerWidth, vh = window.innerHeight;

  function resize() {
    vw = window.innerWidth; vh = window.innerHeight;
    canvas.width = vw * DPR; canvas.height = vh * DPR;
    canvas.style.width = vw + "px"; canvas.style.height = vh + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener("resize", resize);

  let activeId = null;
  let hoverId = null;
  let projectedCache = [];

  // 4-pointed sparkle — soft hue-tinted glows, less white overall
  function drawSparkle(x, y, size, hue, opacity, full) {
    const rayLen = size * (full ? 2.6 : 1.8);
    const rayWidth = size * 0.55;
    ctx.save();
    ctx.translate(x, y);

    // Vertical ray — hue-tinted radial gradient
    ctx.save();
    ctx.scale(1, rayLen / rayWidth);
    const vg = ctx.createRadialGradient(0, 0, 0, 0, 0, rayWidth);
    vg.addColorStop(0,   `hsla(${hue}, 75%, 90%, ${opacity * 0.55})`);
    vg.addColorStop(0.4, `hsla(${hue}, 85%, 86%, ${opacity * 0.22})`);
    vg.addColorStop(1,   `hsla(${hue}, 85%, 84%, 0)`);
    ctx.fillStyle = vg;
    ctx.beginPath(); ctx.arc(0, 0, rayWidth, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Horizontal ray
    ctx.save();
    ctx.scale(rayLen / rayWidth, 1);
    const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, rayWidth);
    hg.addColorStop(0,   `hsla(${hue}, 75%, 90%, ${opacity * 0.55})`);
    hg.addColorStop(0.4, `hsla(${hue}, 85%, 86%, ${opacity * 0.22})`);
    hg.addColorStop(1,   `hsla(${hue}, 85%, 84%, 0)`);
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0, 0, rayWidth, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Soft colored aura under everything
    if (full) {
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.4);
      glow.addColorStop(0, `hsla(${hue}, 90%, 88%, ${opacity * 0.4})`);
      glow.addColorStop(1, `hsla(${hue}, 90%, 84%, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(0, 0, size * 2.4, 0, Math.PI * 2); ctx.fill();
    }

    // Hue-tinted core — barely white, mostly the star's own color
    const core = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 1.2);
    core.addColorStop(0,   `hsla(${hue}, 60%, 95%, ${opacity * 0.7})`);
    core.addColorStop(0.4, `hsla(${hue}, 70%, 90%, ${opacity * 0.4})`);
    core.addColorStop(0.7, `hsla(${hue}, 75%, 86%, ${opacity * 0.15})`);
    core.addColorStop(1,   `hsla(${hue}, 75%, 84%, 0)`);
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(0, 0, size * 1.2, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  // Color attractors — warm rose/pink dominant, cool tones as occasional accents.
  // Multiple warm attractors with high weights cluster the orb in pink/peach/rose,
  // while cyan/gold/lavender appear as smaller pockets.
  const ATTRACTORS = [
    { x:  0.55, y:  0.25, z:  0.35, hue: 348, w: 1.8 },  // rose (dominant)
    { x: -0.20, y:  0.55, z:  0.40, hue: 332, w: 1.6 },  // pink (dominant)
    { x:  0.30, y: -0.40, z:  0.55, hue:   8, w: 1.4 },  // warm rose
    { x: -0.55, y: -0.30, z: -0.20, hue:  28, w: 1.2 },  // peach (medium)
    { x:  0.10, y:  0.10, z: -0.75, hue: 195, w: 0.55 }, // cyan (accent)
    { x: -0.40, y:  0.45, z: -0.40, hue: 280, w: 0.50 }, // lavender (accent)
    { x:  0.40, y: -0.55, z: -0.20, hue:  46, w: 0.45 }  // gold (accent)
  ];

  // Hue from a 3D point — circular mean of attractors weighted by 1/d^4 for blob falloff
  function hueAt(p) {
    let sx = 0, sy = 0;
    for (const a of ATTRACTORS) {
      const dx = p.x - a.x, dy = p.y - a.y, dz = p.z - a.z;
      const d2 = dx*dx + dy*dy + dz*dz + 0.05;
      const w = a.w / (d2 * d2);
      const r = a.hue * Math.PI / 180;
      sx += w * Math.cos(r);
      sy += w * Math.sin(r);
    }
    let h = Math.atan2(sy, sx) * 180 / Math.PI;
    return ((h % 360) + 360) % 360;
  }

  // Saturation/lightness near attractors is higher; in-between is softer
  function colorAt(p) {
    let sx = 0, sy = 0, peakW = 0;
    for (const a of ATTRACTORS) {
      const dx = p.x - a.x, dy = p.y - a.y, dz = p.z - a.z;
      const d2 = dx*dx + dy*dy + dz*dz + 0.05;
      const w = a.w / (d2 * d2);
      peakW = Math.max(peakW, w);
      const r = a.hue * Math.PI / 180;
      sx += w * Math.cos(r);
      sy += w * Math.sin(r);
    }
    const total = Math.hypot(sx, sy);
    const concentration = total === 0 ? 0 : Math.min(1, peakW / total);
    let h = Math.atan2(sy, sx) * 180 / Math.PI;
    return {
      hue: ((h % 360) + 360) % 360,
      sat: 55 + concentration * 25,           // 55..80
      light: 80 + (1 - concentration) * 8     // 80..88
    };
  }

  // Real constellation patterns — 2D star coords + edge lists
  const CONSTELLATION_PATTERNS = [
    { name: "Big Dipper",
      stars: [[0,0],[0.75,0.15],[0.85,-0.45],[0.10,-0.50],[-0.65,0.30],[-1.20,0.50],[-1.65,0.35]],
      edges: [[0,1],[1,2],[2,3],[3,0],[0,4],[4,5],[5,6]] },
    { name: "Orion",
      stars: [[-0.6,0.8],[0.6,0.7],[-0.3,0.05],[0,0],[0.3,-0.05],[-0.7,-0.7],[0.7,-0.8],[0,-0.4]],
      edges: [[0,2],[0,1],[1,4],[2,3],[3,4],[2,5],[4,6],[5,6],[3,7]] },
    { name: "Cassiopeia",
      stars: [[-1,0],[-0.5,0.55],[0,0.05],[0.5,0.6],[1,-0.05]],
